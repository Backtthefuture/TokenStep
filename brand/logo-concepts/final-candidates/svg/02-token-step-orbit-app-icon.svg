<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <title>TokenStep Token Step Orbit App Icon</title>
  <desc>Flat app icon candidate with a stronger daily step progression built from token blocks inside the orbit.</desc>
  <g id="app-tile">
    <rect x="6" y="6" width="88" height="88" rx="22" fill="#F7FAF8" stroke="#DDE8E1" stroke-width="1.4"/>
  </g>
  <g id="progress-ring">
    <circle cx="50" cy="50" r="32" fill="none" stroke="#E6EFE9" stroke-width="8"/>
    <circle cx="50" cy="50" r="32" fill="none" stroke="#2DA44E" stroke-width="8" stroke-linecap="round" stroke-dasharray="148 53" transform="rotate(-118 50 50)"/>
    <circle cx="73.2" cy="28.2" r="5.2" fill="#2DA44E"/>
  </g>
  <g id="token-stair" fill="#1F2937">
    <rect x="31.8" y="57.2" width="9.6" height="9.6" rx="2.4"/>
    <rect x="43.6" y="51.2" width="9.6" height="9.6" rx="2.4"/>
    <rect x="55.4" y="45.2" width="9.6" height="9.6" rx="2.4"/>
    <rect x="67.2" y="39.2" width="9.6" height="9.6" rx="2.4"/>
  </g>
</svg>
